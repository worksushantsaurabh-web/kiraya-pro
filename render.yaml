services:
  - type: web
    name: kiraya-pro-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: kiraya-pro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

databases:
  - name: kiraya-pro-db
    plan: free
